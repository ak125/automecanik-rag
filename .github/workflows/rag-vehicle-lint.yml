name: 🚗 RAG Vehicle Lint

# Stage 0 A07 of ADR-022 (R8 RAG Control Plane) — shipped in automecanik-rag repo
# where the actual RAG vehicle files live (knowledge/vehicles/**).
#
# Validates :
#   - knowledge/vehicles/*.md                  frontmatter vs vehicle-model.schema.json
#   - knowledge/vehicles/*.variations.yaml     vs vehicle-variations.schema.json
#   - knowledge/vehicles/*.role_map.json       vs vehicle-role-map.schema.json
#
# Schemas source : ak125/governance-vault @ _scripts/schemas/
#
# Triggers on any PR touching knowledge/vehicles/** or the workflow itself.

on:
  pull_request:
    branches: [main]
    paths:
      - 'knowledge/vehicles/**'
      - '.github/workflows/rag-vehicle-lint.yml'
  push:
    branches: [main]
    paths:
      - 'knowledge/vehicles/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: rag-vehicle-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Validate vehicle RAG artefacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout automecanik-rag
        uses: actions/checkout@v4

      - name: Checkout governance-vault (for JSON Schemas)
        uses: actions/checkout@v4
        with:
          repository: ak125/governance-vault
          ref: main
          path: .vault
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install validators
        run: npm install --no-save ajv-cli@5 ajv-formats@3 js-yaml@4

      - name: Verify schemas exist
        run: |
          for s in vehicle-model vehicle-variations vehicle-role-map; do
            if [ ! -f ".vault/_scripts/schemas/${s}.schema.json" ]; then
              echo "::error::Schema missing in vault : ${s}.schema.json"
              exit 1
            fi
            echo "OK schema found : ${s}.schema.json"
          done

      - name: Validate vehicle-model files (.md frontmatter)
        run: |
          set -e
          FAIL=0
          shopt -s nullglob
          for f in knowledge/vehicles/*.md; do
            node - <<'NODE_EOF' "$f"
          const fs = require('fs');
          const yaml = require('js-yaml');
          const content = fs.readFileSync(process.argv[1], 'utf8');
          const match = content.match(/^---\n([\s\S]*?)\n---/);
          if (!match) { console.error('NO_FRONTMATTER in', process.argv[1]); process.exit(2); }
          const data = yaml.load(match[1]);
          fs.writeFileSync('/tmp/frontmatter.json', JSON.stringify(data, null, 2));
          NODE_EOF
            if ! npx -y ajv-cli@5 validate \
                 -s .vault/_scripts/schemas/vehicle-model.schema.json \
                 -d /tmp/frontmatter.json \
                 --strict=false --errors=text -c ajv-formats; then
              echo "::error file=$f::Vehicle model frontmatter fails vehicle-model.schema.json"
              FAIL=$((FAIL + 1))
            else
              echo "OK $f"
            fi
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL vehicle-model file(s) failed validation"
            exit 1
          fi

      - name: Validate variations files (.variations.yaml)
        run: |
          set -e
          FAIL=0
          shopt -s nullglob
          for f in knowledge/vehicles/*.variations.yaml; do
            node - <<'NODE_EOF' "$f"
          const fs = require('fs');
          const yaml = require('js-yaml');
          const data = yaml.load(fs.readFileSync(process.argv[1], 'utf8'));
          fs.writeFileSync('/tmp/variations.json', JSON.stringify(data, null, 2));
          NODE_EOF
            if ! npx -y ajv-cli@5 validate \
                 -s .vault/_scripts/schemas/vehicle-variations.schema.json \
                 -d /tmp/variations.json \
                 --strict=false --errors=text -c ajv-formats; then
              echo "::error file=$f::Variations fails vehicle-variations.schema.json"
              FAIL=$((FAIL + 1))
            else
              echo "OK $f"
            fi
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL variations file(s) failed validation"
            exit 1
          fi

      - name: Validate role_map files (.role_map.json)
        run: |
          set -e
          FAIL=0
          shopt -s nullglob
          for f in knowledge/vehicles/*.role_map.json; do
            if ! npx -y ajv-cli@5 validate \
                 -s .vault/_scripts/schemas/vehicle-role-map.schema.json \
                 -d "$f" \
                 --strict=false --errors=text -c ajv-formats; then
              echo "::error file=$f::Role map fails vehicle-role-map.schema.json"
              FAIL=$((FAIL + 1))
            else
              echo "OK $f"
            fi
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL role_map file(s) failed validation"
            exit 1
          fi

      - name: Forbidden terms check (placeholder)
        run: |
          # Stage 0 placeholder : full 29-term list from backend constants wired in Stage 1.
          FORBIDDEN=("Skip to main content" "Source: web/" "etape par etape" "tuto complet")
          FAIL=0
          shopt -s nullglob
          for f in knowledge/vehicles/*.md knowledge/vehicles/*.variations.yaml; do
            for t in "${FORBIDDEN[@]}"; do
              if grep -qiF "$t" "$f"; then
                echo "::error file=$f::Forbidden term detected: '$t'"
                FAIL=$((FAIL + 1))
              fi
            done
          done
          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi
          echo "No forbidden terms (placeholder list)"

      - name: Summary
        if: always()
        run: |
          count_md=$(find knowledge/vehicles -maxdepth 1 -name '*.md' 2>/dev/null | wc -l)
          count_var=$(find knowledge/vehicles -maxdepth 1 -name '*.variations.yaml' 2>/dev/null | wc -l)
          count_rm=$(find knowledge/vehicles -maxdepth 1 -name '*.role_map.json' 2>/dev/null | wc -l)
          echo "rag-vehicle-lint: md=$count_md variations=$count_var role_map=$count_rm"
