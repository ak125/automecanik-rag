name: RAG Eval Gate

on:
  workflow_dispatch:
    inputs:
      rag_url:
        description: "RAG API base URL (e.g. https://rag.example.com)"
        required: true
        default: "http://localhost:8000"
      eval_set:
        description: "Eval set file path"
        required: true
        default: "tests/eval_set.json"
      min_catalog_recall:
        description: "Minimum KB_Catalog recall"
        required: true
        default: "0.90"
      max_no_evidence_rate:
        description: "Maximum no-evidence rate"
        required: true
        default: "0.05"
      min_satisfaction:
        description: "Minimum satisfaction"
        required: true
        default: "0.90"
  schedule:
    # Nightly 04:00 UTC. Uses defaults below (localhost RAG on self-hosted runner).
    - cron: '0 4 * * *'

permissions:
  contents: read

env:
  RAG_URL: ${{ inputs.rag_url || 'http://localhost:8000' }}
  EVAL_SET: ${{ inputs.eval_set || 'tests/eval_set.json' }}
  MIN_CATALOG_RECALL: ${{ inputs.min_catalog_recall || '0.90' }}
  MAX_NO_EVIDENCE_RATE: ${{ inputs.max_no_evidence_rate || '0.05' }}
  MIN_SATISFACTION: ${{ inputs.min_satisfaction || '0.90' }}

jobs:
  eval-gate:
    name: Eval + Threshold Gate
    # Self-hosted to access localhost RAG on DEV VPS. Public ufw blocks 8000.
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run eval set
        env:
          RAG_API_KEY: ${{ secrets.RAG_API_KEY }}
        run: |
          if [ -z "$RAG_API_KEY" ]; then
            echo "Missing secret: RAG_API_KEY"
            exit 1
          fi
          python tests/run_eval_set.py \
            --url "$RAG_URL" \
            --eval-set "$EVAL_SET" \
            --out tests/eval_report_ci.json

      - name: Enforce quality gate
        run: |
          python tests/check_eval_thresholds.py \
            --report tests/eval_report_ci.json \
            --min-catalog-recall "$MIN_CATALOG_RECALL" \
            --max-no-evidence-rate "$MAX_NO_EVIDENCE_RATE" \
            --min-satisfaction "$MIN_SATISFACTION"

      - name: Publish summary
        if: always()
        run: |
          echo "## RAG Eval Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tests/eval_report_ci.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat tests/eval_report_ci.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No eval report produced." >> $GITHUB_STEP_SUMMARY
          fi
