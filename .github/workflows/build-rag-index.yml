name: 📚 Build RAG Index

on:
  push:
    branches: [main]
    paths:
      - 'knowledge/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: 🔍 Validate Knowledge Files
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install PyYAML
        run: pip install pyyaml --quiet

      - name: 🔍 Validate frontmatter and truth_level
        id: validate
        run: |
          echo "🔍 Validating knowledge files..."

          VALID_COUNT=0
          INVALID_COUNT=0

          for file in $(find knowledge -name "*.md" -type f); do
            # Check for YAML frontmatter
            if ! head -n 1 "$file" | grep -q "^---$"; then
              echo "  ⚠️ $file — missing frontmatter (ignored)"
              INVALID_COUNT=$((INVALID_COUNT + 1))
              continue
            fi

            # Check for truth_level field
            if ! grep -q "^truth_level:" "$file"; then
              echo "  ⚠️ $file — missing truth_level (ignored)"
              INVALID_COUNT=$((INVALID_COUNT + 1))
              continue
            fi

            # Validate truth_level value (L1-L4)
            LEVEL=$(grep "^truth_level:" "$file" | cut -d':' -f2 | tr -d ' "')
            if [[ ! "$LEVEL" =~ ^L[1-4]$ ]]; then
              echo "  ❌ $file — invalid truth_level: $LEVEL"
              INVALID_COUNT=$((INVALID_COUNT + 1))
              continue
            fi

            VALID_COUNT=$((VALID_COUNT + 1))
          done

          echo ""
          echo "📊 $VALID_COUNT valid, $INVALID_COUNT ignored"

          if [ $INVALID_COUNT -gt 0 ]; then
            echo "::warning::$INVALID_COUNT files ignored (missing frontmatter or truth_level)"
          fi

          if [ $VALID_COUNT -eq 0 ]; then
            echo "::error::No valid documents found"
            exit 1
          fi

      - name: 🧪 Parse YAML frontmatter (strict)
        run: |
          python3 - <<'EOF'
          import yaml, re, sys, glob, os

          errors = []

          for path in sorted(glob.glob('knowledge/**/*.md', recursive=True)):
              content = open(path, encoding='utf-8', errors='replace').read()
              m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              if not m:
                  continue  # already reported by bash step above
              try:
                  yaml.safe_load(m.group(1))
              except yaml.YAMLError as e:
                  errors.append(f'{path}: {str(e)[:200]}')

          if errors:
              print(f'❌ {len(errors)} file(s) have invalid YAML frontmatter:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)

          print(f'✅ All frontmatter blocks parse as valid YAML')
          EOF

  build-index:
    name: 🚀 Build Weaviate Index
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install weaviate-client pyyaml fastembed --quiet

      - name: 🔄 Run reindex
        env:
          WEAVIATE_URL: ${{ secrets.WEAVIATE_URL }}
          WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
        run: |
          python scripts/reindex.py --path knowledge/
