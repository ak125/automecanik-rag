name: 📚 Build RAG Index

on:
  push:
    branches: [main]
    paths:
      - 'knowledge/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: 🔍 Validate Knowledge Files
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🔍 Validate frontmatter and truth_level
        id: validate
        run: |
          echo "🔍 Validating knowledge files..."

          VALID_COUNT=0
          INVALID_COUNT=0

          for file in $(find knowledge -name "*.md" -type f); do
            # Check for YAML frontmatter
            if ! head -n 1 "$file" | grep -q "^---$"; then
              echo "  ⚠️ $file — missing frontmatter (ignored)"
              INVALID_COUNT=$((INVALID_COUNT + 1))
              continue
            fi

            # Check for truth_level field
            if ! grep -q "^truth_level:" "$file"; then
              echo "  ⚠️ $file — missing truth_level (ignored)"
              INVALID_COUNT=$((INVALID_COUNT + 1))
              continue
            fi

            # Validate truth_level value (L1-L4)
            LEVEL=$(grep "^truth_level:" "$file" | cut -d':' -f2 | tr -d ' "')
            if [[ ! "$LEVEL" =~ ^L[1-4]$ ]]; then
              echo "  ❌ $file — invalid truth_level: $LEVEL"
              INVALID_COUNT=$((INVALID_COUNT + 1))
              continue
            fi

            VALID_COUNT=$((VALID_COUNT + 1))
          done

          echo ""
          echo "📊 $VALID_COUNT valid, $INVALID_COUNT ignored"

          if [ $INVALID_COUNT -gt 0 ]; then
            echo "::warning::$INVALID_COUNT files ignored (missing frontmatter or truth_level)"
          fi

          if [ $VALID_COUNT -eq 0 ]; then
            echo "::error::No valid documents found"
            exit 1
          fi
